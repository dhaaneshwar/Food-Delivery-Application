server.port=8080

spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=restaurant-service
spring.cloud.gateway.routes[1].uri=lb://RESTAURANT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/restaurants/**

spring.cloud.gateway.routes[2].id=menu-service
spring.cloud.gateway.routes[2].uri=lb://MENU-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/menus/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[4].id=delivery-service
spring.cloud.gateway.routes[4].uri=lb://DELIVERY-PARTNER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/delivery-partners/**
spring.cloud.gateway.routes[4].predicates[1]=Path=/deliveries/**

spring.cloud.gateway.routes[5].id=inventory-service
spring.cloud.gateway.routes[5].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/inventory/**